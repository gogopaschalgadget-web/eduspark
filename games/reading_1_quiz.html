html,body{width:100%;height:100%;}
body{font-family:'Nunito',sans-serif;background:var(--light);color:var(--dark);}

.logo{font-size:1.5rem;font-weight:800;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:0.5rem;}
.nav-links{display:flex;list-style:none;gap:2rem;}
.nav-links a{text-decoration:none;color:var(--dark);font-weight:600;transition:color 0.3s;font-size:0.95rem;}
.nav-links a:hover{color:var(--primary);}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;}
.hamburger span{width:25px;height:3px;background:var(--dark);border-radius:2px;transition:0.3s;}
@media(max-width:768px){.nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:white;flex-direction:column;padding:1rem;gap:1rem;border-bottom:1px solid var(--border);}.nav-links.active{display:flex;}.hamburger{display:flex;}}
.breadcrumb{max-width:1200px;margin:0 auto;padding:1rem;font-size:0.9rem;color:#666;}
.breadcrumb a{color:var(--primary);text-decoration:none;}
.hero{background:linear-gradient(135deg,var(--primary) 0%,#8B5CF6 100%);color:white;padding:3rem 1rem;text-align:center;}
.hero-content{max-width:800px;margin:0 auto;}
.hero h1{font-size:2.5rem;font-weight:800;margin-bottom:0.5rem;}
.hero-meta{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;font-size:1.05rem;margin-top:1rem;}
.grade-tag{background:rgba(255,255,255,0.3);padding:0.5rem 1rem;border-radius:20px;font-weight:600;}
.game-section{max-width:800px;margin:2rem auto;padding:0 1rem;}
.game-card{background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);overflow:hidden;}
.game-content{padding:2rem;}
.container{background:white;border-radius:12px;padding:2rem;}
.header{text-align:center;margin-bottom:2rem;}
.header h1{color:var(--primary);font-size:2rem;font-weight:800;margin-bottom:0.5rem;}
.header p{color:#666;font-size:1.05rem;}
.counter{color:#666;font-size:1.05rem;margin:1rem 0;}
.instructions{color:#666;font-size:0.95rem;margin:1.5rem 0;padding:1rem;background:var(--light);border-radius:8px;text-align:center;}
.progress{background:var(--border);height:8px;border-radius:8px;margin:1.5rem 0;overflow:hidden;}
.progress-bar{background:linear-gradient(90deg,var(--primary),#8B5CF6);height:100%;transition:width 0.3s;border-radius:8px;}
.question{background:var(--light);padding:1.5rem;border-radius:12px;margin:1.5rem 0;border-left:4px solid var(--primary);}
.question-text{font-size:1.3rem;font-weight:700;color:var(--dark);margin-bottom:1.5rem;}
.options{display:flex;flex-direction:column;gap:0.75rem;}
.option{padding:1rem;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:1rem;transition:all 0.3s;background:white;font-weight:600;}
.option:hover{border-color:var(--primary);background:rgba(108,99,255,0.05);transform:translateX(4px);}
.option.selected{background:var(--primary);color:white;border-color:var(--primary);}
.option.correct{background:#10B981;color:white;border-color:#10B981;}
.option.incorrect{background:#EF4444;color:white;border-color:#EF4444;}
.flashcard{perspective:1000px;height:300px;margin:2rem 0;cursor:pointer;}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d;}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:1.8rem;font-weight:800;padding:2rem;text-align:center;}
.flashcard-front{background:linear-gradient(135deg,var(--primary),#8B5CF6);color:white;}
.flashcard-back{background:linear-gradient(135deg,var(--teal),#06B6D4);color:white;transform:rotateY(180deg);}
.btn{padding:1rem 2rem;font-size:1rem;border:none;border-radius:8px;cursor:pointer;transition:all 0.3s;font-weight:700;font-family:'Nunito',sans-serif;}
.btn-primary{background:linear-gradient(135deg,var(--primary),#8B5CF6);color:white;}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 8px 16px rgba(108,99,255,0.3);}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.btn-secondary{background:var(--border);color:var(--dark);font-weight:600;}
.btn-secondary:hover{background:#D1D5DB;}
.controls{display:flex;justify-content:center;gap:1rem;margin:2rem 0;flex-wrap:wrap;}
.next-btn-container{text-align:center;margin:2rem 0;}
.results{text-align:center;display:none;}
.score{font-size:3rem;color:#10B981;font-weight:800;margin:1.5rem 0;}
.score.warning{color:var(--orange);}
.score.danger{color:#EF4444;}
.results-text{font-size:1.2rem;color:#666;margin:1rem 0;}
.stars{font-size:2rem;margin:1rem 0;}
footer{background:var(--dark);color:white;padding:2rem;text-align:center;margin-top:3rem;}
footer p{margin:0.5rem 0;font-size:0.9rem;}
footer a{color:var(--primary);text-decoration:none;}

<script>
const questions = [{"q": "What do we read from?", "a": "Books", "opts": ["Books", "Cups", "Doors"]}, {"q": "What color is the sky?", "a": "Blue", "opts": ["Green", "Blue", "Red"]}, {"q": "What animal says 'moo'?", "a": "Cow", "opts": ["Dog", "Cow", "Cat"]}, {"q": "How many legs does a dog have?", "a": "4", "opts": ["2", "3", "4"]}, {"q": "What is the opposite of hot?", "a": "Cold", "opts": ["Warm", "Cold", "Hot"]}, {"q": "What comes after Monday?", "a": "Tuesday", "opts": ["Sunday", "Tuesday", "Wednesday"]}, {"q": "How many wheels does a bike have?", "a": "2", "opts": ["1", "2", "3"]}, {"q": "What animal says 'quack'?", "a": "Duck", "opts": ["Goose", "Duck", "Chicken"]}];
let currentQuestion = 0;
let score = 0;
let answered = false;
let selectedAnswer = null;

function shuffleArray(arr) {
  const newArr = [...arr];
  for (let i = newArr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

function displayQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('questionText').textContent = q.q;
  const options = shuffleArray(q.opts);
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  options.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = opt;
    div.onclick = () => selectAnswer(opt, div);
    container.appendChild(div);
  });
  document.getElementById('nextBtn').disabled = true;
  answered = false;
  selectedAnswer = null;
  const progress = ((currentQuestion) / questions.length) * 100;
  document.getElementById('progressBar').style.width = progress + '%';
}

function selectAnswer(answer, element) {
  if (answered) return;
  answered = true;
  selectedAnswer = answer;
  const q = questions[currentQuestion];
  const correct = q.a === answer;
  document.querySelectorAll('.option').forEach(opt => {
    if (opt.textContent === q.a) opt.classList.add('correct');
    if (opt === element && !correct) opt.classList.add('incorrect');
    opt.style.pointerEvents = 'none';
  });
  if (correct) score++;
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion < questions.length) {
    displayQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  const percentage = Math.round((score / questions.length) * 100);
  let stars = '⭐';
  if (percentage >= 80) stars = '⭐⭐⭐';
  else if (percentage >= 60) stars = '⭐⭐';
  let scoreClass = 'danger';
  if (percentage >= 80) scoreClass = '';
  else if (percentage >= 60) scoreClass = 'warning';
  document.getElementById('scoreDisplay').textContent = score + '/' + questions.length;
  document.getElementById('scoreDisplay').className = 'score ' + scoreClass;
  document.getElementById('starsDisplay').textContent = stars;
  const messages = ['Awesome job!', 'You\'re doing great!', 'Keep practicing!', 'Nice work!'];
  const msg = messages[Math.floor(Math.random() * messages.length)];
  document.getElementById('resultsText').textContent = percentage + '% correct — ' + msg;
}

displayQuestion();
</script>
