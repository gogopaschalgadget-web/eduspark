<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5182415121977508" crossorigin="anonymous"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Games - EduSpark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', cursive, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: white;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 40px;
            text-align: center;
        }
        header h1 {
            color: #f5576c;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .btn-play {
            display: inline-block;
            padding: 10px 20px;
            background: #f5576c;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" style="color: white; text-decoration: none;">← Back</a>
        <header>
            <h1>Science Learning Games</h1>
        </header>
        <div class="games-grid">
            
        <div class="game-card">
            <h3>1st Grade Science</h3>
            <p>Grade 1</p>
            <a href="/games/science_1_quiz.html" class="btn-play">Play →</a>
        </div>
        <div class="game-card">
            <h3>5th Grade Science</h3>
            <p>Grade 5</p>
            <a href="/games/science_5_quiz.html" class="btn-play">Play →</a>
        </div>
        </div>
    </div>
</body>
</html>
